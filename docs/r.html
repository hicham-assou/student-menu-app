<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stud'Table</title>
  <style>
    :root { --orange: #F97316; --ink: #1C1917; --muted: #78716C; --bg: #FAFAF9; }
    * { box-sizing: border-box; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;
    }
    .card {
      background: #fff; border-radius: 24px; padding: 36px 28px; max-width: 420px; width: 100%;
      box-shadow: 0 8px 30px rgba(0,0,0,.08); text-align: center;
    }
    .brand { font-size: 13px; font-weight: 800; letter-spacing: .5px; color: var(--orange); text-transform: uppercase; }
    h1 { font-size: 24px; font-weight: 800; letter-spacing: -.5px; margin: 10px 0 6px; }
    p { color: var(--muted); margin: 0 0 24px; font-size: 15px; line-height: 1.5; }
    .btn {
      display: block; width: 100%; text-decoration: none; text-align: center;
      background: var(--orange); color: #fff; font-weight: 700; font-size: 16px;
      border: none; border-radius: 14px; padding: 16px; margin-bottom: 12px; cursor: pointer;
    }
    .btn.secondary { background: var(--bg); color: var(--ink); }
    .emoji { font-size: 42px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="emoji">🍽️</div>
    <span class="brand">Stud'Table</span>
    <h1 id="title">Voir ce restaurant</h1>
    <p>Ouvre ce restaurant dans l'application Stud'Table pour voir le menu étudiant et les prix.</p>
    <a class="btn" id="openBtn" href="#">Ouvrir dans l'app</a>
    <a class="btn secondary" href="./index.html">Découvrir Stud'Table</a>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var id = params.get("id");
      var name = params.get("name");

      if (name) {
        document.getElementById("title").textContent = decodeURIComponent(name);
        document.title = decodeURIComponent(name) + " — Stud'Table";
      }

      var deepLink = id ? "studentmenuapp://restaurant/" + id : "studentmenuapp://";
      document.getElementById("openBtn").setAttribute("href", deepLink);

      // Tentative d'ouverture automatique de l'app
      if (id) {
        setTimeout(function () {
          window.location.href = deepLink;
        }, 400);
      }
    })();
  </script>
</body>
</html>
