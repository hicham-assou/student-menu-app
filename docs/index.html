<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stud'Table</title>
  <style>
    :root { --orange: #F97316; --ink: #1C1917; --muted: #78716C; --bg: #FAFAF9; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .card {
      background: #fff; border-radius: 24px; padding: 40px; max-width: 420px; width: 90%;
      box-shadow: 0 8px 30px rgba(0,0,0,.08); text-align: center;
    }
    .brand { font-size: 14px; font-weight: 800; letter-spacing: .5px; color: var(--orange); text-transform: uppercase; }
    h1 { font-size: 30px; font-weight: 800; letter-spacing: -.6px; margin: 10px 0; }
    p { color: var(--muted); margin: 0 0 26px; }
    a.btn {
      display: block; text-decoration: none; color: var(--ink); font-weight: 700;
      background: var(--bg); border-radius: 14px; padding: 16px; margin-bottom: 12px;
    }
    a.btn:hover { background: #f1ece6; }
  </style>
</head>
<body>
  <div class="card">
    <span class="brand">Stud'Table</span>
    <h1>Le menu étudiant près de toi 🍽️</h1>
    <p>Trouve les restaurants avec menus étudiants en Belgique.</p>
    <a class="btn" href="./privacy-policy.html">Politique de confidentialité</a>
    <a class="btn" href="./delete-account.html">Supprimer mon compte</a>
  </div>
</body>
</html>
